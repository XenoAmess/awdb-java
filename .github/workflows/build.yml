name: build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [8, 11, 17, 21]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Build
        run: mvn -B package
      - name: Upload jar
        uses: actions/upload-artifact@v7
        with:
          name: awdb-java-jdk${{ matrix.java }}
          path: target/awdb-java-*.jar
          if-no-files-found: error
