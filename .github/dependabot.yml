version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
      include: scope
    groups:
      maven-main:
        dependency-type: production
        update-types: [minor, patch]
      maven-test:
        dependency-type: development
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns: ["*"]
